# ─────────────────────────────────────────────────────────────────────────────
#  PUT THIS FILE IN YOUR OBSIDIAN VAULT REPO (not the website repo):
#
#    obsidian-vault/.github/workflows/trigger-website.yml
#
#  What it does:
#    Whenever you push to your vault repo (Obsidian Git auto-push),
#    this Action calls the Cloudflare Pages deploy hook, which triggers
#    the website to rebuild and pick up your new blog posts.
#
#  Setup:
#    1. In Cloudflare Pages → your project → Settings → Builds & deployments
#       → Deploy hooks → Add deploy hook (name it "obsidian-trigger")
#       Copy the hook URL (looks like https://api.cloudflare.com/client/v4/pages/webhooks/deploy_hooks/xxx)
#
#    2. In your VAULT GitHub repo → Settings → Secrets → Actions
#       Add secret:  CF_DEPLOY_HOOK_URL = <paste the URL from step 1>
#
#    3. Copy this file to:
#       obsidian-vault/.github/workflows/trigger-website.yml
# ─────────────────────────────────────────────────────────────────────────────

name: Trigger website rebuild

on:
  push:
    branches: [main]
    paths:
      - 'blogs/**'   # only rebuild when a blog post changes

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages deploy
        run: curl -X POST "${{ secrets.CF_DEPLOY_HOOK_URL }}"

